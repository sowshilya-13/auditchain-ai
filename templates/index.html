<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditChain AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid justify-content-end px-4">
            <button class="btn btn-outline-light btn-sm me-2" id="clear-btn" title="Clear Chat">
                <i class="fas fa-trash"></i>
            </button>
            <button class="btn btn-outline-light btn-sm" id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container d-flex flex-column" style="height: 90vh;">
        <!-- Header based on user image -->
        <div class="text-center mt-4 mb-4" id="header-container">
            <h1 class="fw-bold">AuditChain AI</h1>
        </div>

        <!-- Chat History Area -->
        <div class="flex-grow-1 overflow-auto rounded mb-3" id="chat-container">
            <!-- Messages will be injected here -->
        </div>

        <!-- Input Area -->
        <div class="input-area mt-auto pb-4">
            <label for="chat-input" class="form-label ms-1">Ask your audit question:</label>
            <div class="input-group">
                <textarea class="form-control rounded custom-input" id="chat-input" rows="1" placeholder="" style="resize: none;"></textarea>
                <button class="btn btn-primary rounded ms-2 send-btn" id="send-btn">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bootstrap & Marked (for Markdown parsing) JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/chat.js"></script>
</body>
</html>
